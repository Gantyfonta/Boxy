<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sector 7-B Warehouse Sandbox</title>
  </head>
  <body class="m-0 p-0 overflow-hidden bg-[#1a1c2c]">
    <div id="game-container" class="relative w-full h-screen bg-[#1a1c2c] overflow-hidden flex flex-col items-center justify-center">
      <!-- Visual background instructions card -->
      <div class="absolute top-4 left-4 z-20 pointer-events-none hidden md:block">
        <div class="p-3 bg-[#333c57]/95 border-2 border-[#10121c] rounded shadow-2xl text-[#f4f4f4] font-mono text-[10px] leading-relaxed max-w-sm">
          <div class="text-[#ffcd75] font-extrabold mb-1 border-b-2 border-[#10121c] pb-1">🔧 MECHANICAL INSTRUCTIONS</div>
          <div><span class="text-[#ef7d57] font-bold">A / D / Arrow Keys</span> : Move left & right</div>
          <div><span class="text-[#ef7d57] font-bold">W / Space</span> : Jump over crates</div>
          <div><span class="text-[#73ef7d] font-bold">E / Tap</span> : Lift box / Drop box</div>
          <div><span class="text-[#ffcd75] font-bold">F</span> : Throw carry box with speed</div>
          <div><span class="text-[#ef7d57] font-bold">Q / Click</span> : Smash / Open near boxes</div>
          <div class="mt-1 text-[#9fadbc] text-[9.5px]">
            <span class="font-semibold text-[#f4f4f4]">Mouse Drag</span> : Throw, fling, and stack boxes with satisfying spring elasticity!
          </div>
        </div>
      </div>

      <!-- Main active gaming canvas container -->
      <div id="canvas-container" class="relative w-full h-full flex items-center justify-center">
        <canvas
          id="retroGameCanvas"
          class="w-full h-full cursor-pointer touch-none block"
          style="image-rendering: pixelated; object-fit: contain;"
        ></canvas>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
